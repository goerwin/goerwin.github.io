name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build before Typecheck because Next.js generates needed "next-env.d.ts" types on the fly
      - name: Build
        run: npm run build

      - name: Build CV PDF
        run: npm run build-cv-pdf

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
